name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: linkplan
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: linkplan
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm --prefix backend ci
      - run: npm --prefix frontend ci
      - run: npm --prefix backend run prisma:generate
      - run: printf "DATABASE_URL=postgresql://%s@localhost:5432/%s?schema=public\n" "$POSTGRES_USER" "$POSTGRES_DB" > backend/.env
      - run: npm --prefix backend run prisma:migrate
      - run: npm --prefix backend run prisma:seed
      - run: npm run lint
      - run: npm run test
      - run: npm run build
